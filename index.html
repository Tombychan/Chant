<script type="module">
import React, { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } from 'react';
import { createRoot } from 'react-dom/client';

const h = React.createElement;

/* ============================================================
   CONSTANTES ET UTILITAIRES AUDIO
   ============================================================ */

// Noms de notes : anglo-saxon et français
const NOTE_NAMES_EN = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_NAMES_FR = ['Do','Do#','Ré','Ré#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];

// MIDI number -> name et octave (ex: 60 -> C4)
function midiToNoteName(midi) {
  const note = NOTE_NAMES_EN[midi % 12];
  const octave = Math.floor(midi / 12) - 1;
  return { en: note + octave, fr: NOTE_NAMES_FR[midi % 12] + octave, enRaw: note, frRaw: NOTE_NAMES_FR[midi % 12], octave };
}

// Name (ex "C4" ou "Do4") -> MIDI
function noteNameToMidi(name) {
  if (!name) return null;
  const normalized = name.replace('b', '#'); // simplification, on n'utilise que les dièses
  // On cherche d'abord en anglais, puis en français
  const enMatch = normalized.match(/^([A-G]#?)(-?\d+)$/);
  if (enMatch) {
    const idx = NOTE_NAMES_EN.indexOf(enMatch[1]);
    if (idx >= 0) return (parseInt(enMatch[2]) + 1) * 12 + idx;
  }
  // Français : Do, Ré, Mi, Fa, Sol, La, Si (avec #)
  const frMatch = normalized.match(/^(Do#?|Ré#?|Re#?|Mi|Fa#?|Sol#?|La#?|Si)(-?\d+)$/);
  if (frMatch) {
    let base = frMatch[1].replace('Re', 'Ré');
    const idx = NOTE_NAMES_FR.indexOf(base);
    if (idx >= 0) return (parseInt(frMatch[2]) + 1) * 12 + idx;
  }
  return null;
}

// MIDI -> fréquence (Hz), formule standard A4 = 440 Hz (MIDI 69)
function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

/* ============================================================
   CONTEXTE AUDIO — gestion iOS Safari
   ============================================================ */

const AudioCtx = createContext(null);

// Détection iOS (iPhone/iPad). Inclut iPadOS qui se déclare comme Mac depuis iOS 13.
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// Petit WAV silencieux en base64 (1 seconde de silence, 8kHz mono 8 bits).
// Utilisé pour initialiser un élément <audio> qui permet de contourner
// le mode silencieux iOS quand l'utilisateur l'active explicitement.
const SILENT_WAV = 'data:audio/wav;base64,UklGRi4AAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACAgICAgICAgICAAAA=';

const LS_FORCE_AUDIO_KEY = 'chant.forceAudioInSilentMode.v1';
const LS_TIMBRE_KEY = 'chant.timbre.v1';

function AudioProvider({ children }) {
  const [activated, setActivated] = useState(false);
  const [forceAudioInSilent, setForceAudioInSilent] = useState(() => {
    try { return localStorage.getItem(LS_FORCE_AUDIO_KEY) === 'true'; } catch { return false; }
  });
  const [timbre, setTimbreState] = useState(() => {
    try { return localStorage.getItem(LS_TIMBRE_KEY) || 'sine'; } catch { return 'sine'; }
  });
  const audioCtxRef = useRef(null);
  const silentAudioRef = useRef(null);

  // Chargement différé de Tone.js Piano (uniquement quand l'utilisateur choisit "piano-samples")
  // Déclaré AVANT setTimbre car setTimbre les référence (TDZ).
  const pianoRef = useRef(null);
  const [pianoStatus, setPianoStatus] = useState('idle'); // 'idle' | 'loading' | 'ready' | 'error'

  const loadTonePiano = useCallback(async () => {
    if (pianoRef.current || pianoStatus === 'loading') return;
    setPianoStatus('loading');
    try {
      const [toneMod, pianoMod] = await Promise.all([
        import('tone'),
        import('@tonejs/piano'),
      ]);
      // S'assurer que le contexte Tone est démarré sur interaction utilisateur
      await toneMod.start();
      const Piano = pianoMod.Piano;
      const piano = new Piano({ velocities: 4 });
      piano.toDestination();
      await piano.load();
      pianoRef.current = piano;
      setPianoStatus('ready');
    } catch (e) {
      console.warn('Tone.js Piano load failed:', e);
      setPianoStatus('error');
    }
  }, [pianoStatus]);

  const setTimbre = useCallback((t) => {
    setTimbreState(t);
    try { localStorage.setItem(LS_TIMBRE_KEY, t); } catch {}
    // Charger Tone.js Piano si demandé et pas déjà chargé
    if (t === 'piano-samples' && pianoStatus === 'idle') {
      loadTonePiano();
    }
  }, [pianoStatus, loadTonePiano]);

  useEffect(() => {
    try { localStorage.setItem(LS_FORCE_AUDIO_KEY, String(forceAudioInSilent)); } catch {}
  }, [forceAudioInSilent]);

  // Crée l'élément <audio> silencieux (appelé quand le toggle est activé OU dès l'activation sur iOS).
  // L'attribut playsinline + la lecture d'un média audio force iOS à classer le son en "playback"
  // (audible même en mode silencieux) plutôt qu'en "ambient" (muté par le switch silencieux).
  // Fiabilité : cette technique repose sur un comportement Safari iOS documenté mais susceptible
  // d'évoluer. Elle est utilisée par Tone.js et Howler.js, entre autres.
  const ensureSilentAudio = useCallback(() => {
    if (silentAudioRef.current) return silentAudioRef.current;
    const audio = document.createElement('audio');
    audio.setAttribute('playsinline', '');
    audio.setAttribute('webkit-playsinline', '');
    audio.loop = true;
    audio.src = SILENT_WAV;
    audio.volume = 0.01; // quasi-silencieux mais pas 0 (certains iOS ignorent vol=0)
    audio.muted = false;
    silentAudioRef.current = audio;
    return audio;
  }, []);

  const ensureContext = useCallback(() => {
    if (!audioCtxRef.current) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtxRef.current = new Ctx();
    }
    if (audioCtxRef.current.state === 'suspended') {
      audioCtxRef.current.resume();
    }
    // Si on est sur iOS et que le toggle "forcer audio en silencieux" est activé,
    // on lance l'élément silencieux pour basculer la catégorie audio.
    if (IS_IOS && forceAudioInSilent) {
      const a = ensureSilentAudio();
      if (a.paused) {
        // Peut échouer silencieusement si l'appel n'est pas déclenché par un geste utilisateur,
        // mais si c'est le cas ensureContext est appelé depuis un onClick, donc OK.
        a.play().catch(() => {});
      }
    } else if (silentAudioRef.current && !silentAudioRef.current.paused) {
      // Si le toggle a été désactivé, on arrête aussi le silencieux.
      silentAudioRef.current.pause();
    }
    setActivated(true);
    return audioCtxRef.current;
  }, [forceAudioInSilent, ensureSilentAudio]);

  // Synthèse sinus pur (par défaut)
  const playSine = useCallback((ctx, freq, duration) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.2, now + 0.07);
    gain.gain.setValueAtTime(0.2, now + duration - 0.2);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  }, []);

  // Synthèse additive type piano : empilement de 4 harmoniques avec amplitudes décroissantes
  // et enveloppe piano (attaque courte, décroissance longue).
  // Fiabilité : son sensiblement plus riche qu'un sinus, perception de hauteur plus stable.
  // Limite honnête : ce n'est pas un vrai piano, c'est un succédané synthétique évocateur.
  const playPiano = useCallback((ctx, freq, duration) => {
    const now = ctx.currentTime;
    const masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);

    // Enveloppe piano : attaque rapide, décroissance exponentielle longue
    masterGain.gain.setValueAtTime(0.0001, now);
    masterGain.gain.exponentialRampToValueAtTime(0.35, now + 0.008); // attaque très courte
    masterGain.gain.exponentialRampToValueAtTime(0.15, now + 0.4);   // décroissance initiale
    masterGain.gain.exponentialRampToValueAtTime(0.05, now + duration * 0.7);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    // Harmoniques : fondamentale + 3 partiels supérieurs, amplitudes décroissantes
    // Ratios légèrement inharmoniques (piano réel : cordes non parfaitement harmoniques)
    const partials = [
      { mult: 1.0,    amp: 1.0,  detune: 0 },      // fondamentale
      { mult: 2.001,  amp: 0.5,  detune: 0 },      // octave
      { mult: 3.004,  amp: 0.25, detune: 0 },      // quinte au-dessus
      { mult: 4.01,   amp: 0.12, detune: 0 },      // double octave
    ];

    const oscs = [];
    for (const p of partials) {
      const osc = ctx.createOscillator();
      const partialGain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * p.mult, now);
      partialGain.gain.value = p.amp;
      osc.connect(partialGain);
      partialGain.connect(masterGain);
      osc.start(now);
      osc.stop(now + duration + 0.05);
      oscs.push(osc);
    }
  }, []);

  // Lecture via Tone.js Piano (vrais samples Salamander Grand Piano).
  // Requiert que pianoRef.current soit prêt (status === 'ready'). Sinon fallback sur synthèse.
  const playPianoSampled = useCallback((freq, duration) => {
    if (!pianoRef.current) return false;
    try {
      // Convertir la fréquence en nom de note (format Tone.js : "C4", "F#3", etc.)
      const midi = Math.round(69 + 12 * Math.log2(freq / 440));
      const info = midiToNoteName(midi);
      pianoRef.current.keyDown({ note: info.en, velocity: 0.7 });
      setTimeout(() => {
        if (pianoRef.current) {
          pianoRef.current.keyUp({ note: info.en });
        }
      }, duration * 1000);
      return true;
    } catch (e) {
      console.warn('Piano sampled playback failed:', e);
      return false;
    }
  }, []);

  const playFrequency = useCallback((freq, duration = 1.5) => {
    const ctx = ensureContext();
    if (timbre === 'piano-samples' && pianoStatus === 'ready') {
      if (playPianoSampled(freq, duration)) return;
      // Fallback si échec
      playPiano(ctx, freq, duration);
      return;
    }
    if (timbre === 'piano' || (timbre === 'piano-samples' && pianoStatus !== 'ready')) {
      playPiano(ctx, freq, duration);
      return;
    }
    playSine(ctx, freq, duration);
  }, [ensureContext, timbre, pianoStatus, playSine, playPiano, playPianoSampled]);

  const playMidi = useCallback((midi, duration) => {
    playFrequency(midiToFreq(midi), duration);
  }, [playFrequency]);

  const playSequence = useCallback(async (midiList, interval = 0.6, duration = 0.5) => {
    for (let i = 0; i < midiList.length; i++) {
      setTimeout(() => playMidi(midiList[i], duration), i * interval * 1000);
    }
  }, [playMidi]);

  // Joue un bip de test court (usage : bouton "Test son" dans le bandeau d'activation)
  const playTestBeep = useCallback(() => {
    playMidi(69, 0.5); // A4, 0.5s
  }, [playMidi]);

  return h(AudioCtx.Provider, {
    value: {
      activated, ensureContext, playFrequency, playMidi, playSequence, playTestBeep,
      isIOS: IS_IOS,
      forceAudioInSilent, setForceAudioInSilent,
      timbre, setTimbre,
      pianoStatus, loadTonePiano,
    },
  }, children);
}

/* ============================================================
   SYNTHÈSE VOCALE (TTS)
   ============================================================ */

function useTTS() {
  const [voices, setVoices] = useState([]);
  const [preferredVoiceName, setPreferredVoiceName] = useState(null);
  const utteranceRef = useRef(null);

  useEffect(() => {
    const load = () => {
      const all = window.speechSynthesis.getVoices();
      const fr = all.filter(v => v.lang && v.lang.startsWith('fr'));
      setVoices(fr);
      if (!preferredVoiceName && fr.length) {
        // Préférence : Thomas > Audrey > première voix fr
        const thomas = fr.find(v => /thomas/i.test(v.name));
        const audrey = fr.find(v => /audrey/i.test(v.name));
        setPreferredVoiceName((thomas || audrey || fr[0]).name);
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
  }, []);

  const speak = useCallback((text) => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR';
    u.rate = 0.95;
    u.pitch = 1.0;
    const voice = voices.find(v => v.name === preferredVoiceName);
    if (voice) u.voice = voice;
    utteranceRef.current = u;
    window.speechSynthesis.speak(u);
  }, [voices, preferredVoiceName]);

  const stop = useCallback(() => {
    window.speechSynthesis.cancel();
  }, []);

  return { voices, preferredVoiceName, setPreferredVoiceName, speak, stop };
}

/* ============================================================
   GESTION DONNÉES — localStorage cache + JSON du repo
   ============================================================ */

const DATA_FILES = ['progression', 'journal', 'tessiture', 'vocabulaire_enseignante'];
const LS_KEY = 'chant.state.v1';
const LS_LAST_MOD = 'chant.lastmod.v1';

// Schémas initiaux — servent de fallback si les JSON du repo sont indisponibles
const INITIAL_STATE = {
  progression: {
    version: '1.0.0',
    changelog: [{ date: new Date().toISOString().slice(0,10), entry: 'Initialisation MVP' }],
    bloc_courant: 'bloc1-s1',
    lecon_courante: 'bloc1-s1-l1',
    lecons: {
      'bloc1-s1-l1': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc1-s1-l2': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc1-s1-l3': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc1-s1-l4': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc1-s1-l5': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc1-s1-l6': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc2-s1-l1': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
      'bloc2-s1-l2': { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null },
    },
  },
  journal: {
    version: '1.0.0',
    changelog: [{ date: new Date().toISOString().slice(0,10), entry: 'Initialisation MVP' }],
    entries: [],
  },
  tessiture: {
    version: '1.0.0',
    changelog: [{ date: new Date().toISOString().slice(0,10), entry: 'Initialisation MVP' }],
    date_evaluation: null,
    notes: {
      parlee_confortable: null,
      grave_limite_confortable: null,
      grave_limite_accessible: null,
      passaggio_pressenti_bas: null,
      aigu_limite_confortable_poitrine: null,
      aigu_limite_confortable_global: null,
      aigu_limite_accessible: null,
    },
    hypothese_fach: null,
    fiabilite_estimation: null,
    reevaluations: [],
  },
  vocabulaire_enseignante: {
    version: '1.0.0',
    changelog: [{ date: new Date().toISOString().slice(0,10), entry: 'Initialisation MVP' }],
    termes: [],
  },
};

async function loadStateFromRepo() {
  const results = {};
  for (const name of DATA_FILES) {
    try {
      const resp = await fetch(`./data/${name}.json?v=${Date.now()}`);
      if (resp.ok) {
        results[name] = await resp.json();
      } else {
        results[name] = JSON.parse(JSON.stringify(INITIAL_STATE[name]));
      }
    } catch (e) {
      results[name] = JSON.parse(JSON.stringify(INITIAL_STATE[name]));
    }
  }
  return results;
}

function loadStateFromLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveStateToLS(state) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    localStorage.setItem(LS_LAST_MOD, new Date().toISOString());
  } catch (e) {
    console.warn('localStorage save failed', e);
  }
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   COMPOSANT NOTE CLIQUABLE
   ============================================================ */

function Note({ name, showFrench = true, duration }) {
  const audio = useContext(AudioCtx);
  const midi = noteNameToMidi(name);
  if (midi === null) return h('span', { className: 'text-red-600' }, `[note inconnue: ${name}]`);
  const info = midiToNoteName(midi);
  const freq = midiToFreq(midi).toFixed(1);

  const label = showFrench ? `${info.en} / ${info.fr}` : info.en;

  return h('button', {
    onClick: () => audio.playMidi(midi, duration),
    className: 'inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md bg-soft hover:bg-rule active:bg-rule border border-rule transition-colors font-mono text-[0.85em] text-ink',
    title: `Jouer ${info.en} (${freq} Hz)`,
    'aria-label': `Jouer la note ${info.en}, équivalent français ${info.fr}, fréquence ${freq} hertz`,
  },
    h('span', { 'aria-hidden': 'true', className: 'text-accent text-[0.9em] leading-none' }, '▸'),
    h('span', null, label)
  );
}

/* ============================================================
   MINI-CLAVIER
   ============================================================ */

function MiniKeyboard({ octaveStart = 3, octaveEnd = 5, showFrench = true }) {
  const audio = useContext(AudioCtx);
  const [labelMode, setLabelMode] = useState('both'); // 'en', 'fr', 'both', 'none'

  const keys = [];
  for (let oct = octaveStart; oct <= octaveEnd; oct++) {
    for (let i = 0; i < 12; i++) {
      const midi = (oct + 1) * 12 + i;
      const isBlack = [1,3,6,8,10].includes(i);
      keys.push({ midi, name: NOTE_NAMES_EN[i] + oct, nameFR: NOTE_NAMES_FR[i] + oct, isBlack, noteIdx: i, oct });
    }
  }
  // On ajoute un C final
  const lastMidi = (octaveEnd + 2) * 12;
  keys.push({ midi: lastMidi, name: 'C' + (octaveEnd+1), nameFR: 'Do' + (octaveEnd+1), isBlack: false, noteIdx: 0, oct: octaveEnd+1 });

  const whiteKeys = keys.filter(k => !k.isBlack);
  const blackKeys = keys.filter(k => k.isBlack);

  return h('div', { className: 'w-full' },
    // Contrôles labels
    h('div', { className: 'flex items-center justify-between mb-3 text-xs text-dim' },
      h('div', { className: 'flex gap-1' },
        ['Ang.', 'Fr.', 'Les deux', 'Aucun'].map((l, i) => {
          const val = ['en','fr','both','none'][i];
          return h('button', {
            key: val,
            onClick: () => setLabelMode(val),
            className: `px-2 py-1 rounded border transition-colors ${labelMode === val ? 'bg-ink text-paper border-ink' : 'bg-paper border-rule hover:border-dim'}`
          }, l);
        })
      ),
      h('span', { className: 'font-mono' }, `Octaves ${octaveStart}–${octaveEnd+1}`)
    ),
    // Piano
    h('div', { className: 'relative select-none', style: { height: '140px' } },
      // Touches blanches
      h('div', { className: 'absolute inset-0 flex' },
        whiteKeys.map((k, i) => h('button', {
          key: k.midi,
          onClick: () => audio.playMidi(k.midi, 1.2),
          className: 'flex-1 border border-rule bg-white hover:bg-soft active:bg-rule rounded-b-sm flex flex-col justify-end items-center pb-2 transition-colors',
          'aria-label': `Jouer ${k.name}, ${k.nameFR}`,
        },
          h('span', { className: 'text-[10px] font-mono text-dim' }, labelMode==='en' || labelMode==='both' ? k.name : ''),
          h('span', { className: 'text-[10px] font-mono text-dim' }, labelMode==='fr' || labelMode==='both' ? k.nameFR : '')
        ))
      ),
      // Touches noires, positionnées en absolu
      h('div', { className: 'absolute inset-0 pointer-events-none' },
        (() => {
          // Pour chaque touche blanche, on peut avoir une noire juste après
          // Les positions relatives des noires par rapport aux blanches dans une octave :
          // après C (C#), après D (D#), après F (F#), après G (G#), après A (A#)
          const blackAfterWhite = { 0: 1, 1: 3, 3: 6, 4: 8, 5: 10 }; // whiteIdx in oct -> noteIdx noire
          const whiteInOctave = [0, 2, 4, 5, 7, 9, 11];
          const nWhite = whiteKeys.length;
          const widthPerWhite = 100 / nWhite;

          return whiteKeys.map((wk, i) => {
            const whiteIdxInOct = whiteInOctave.indexOf(wk.noteIdx);
            const blackNoteIdx = blackAfterWhite[whiteIdxInOct];
            if (blackNoteIdx === undefined) return null;
            // Vérifier qu'on n'est pas sur la dernière touche
            if (i === nWhite - 1) return null;
            const blackMidi = (wk.oct + 1) * 12 + blackNoteIdx;
            const blackName = NOTE_NAMES_EN[blackNoteIdx] + wk.oct;
            const blackNameFR = NOTE_NAMES_FR[blackNoteIdx] + wk.oct;
            const left = (i + 1) * widthPerWhite - (widthPerWhite * 0.3);
            return h('button', {
              key: blackMidi,
              onClick: () => audio.playMidi(blackMidi, 1.2),
              className: 'absolute bg-ink hover:bg-dim active:bg-accent rounded-b-sm text-paper flex items-end justify-center pb-1 transition-colors pointer-events-auto',
              style: {
                left: `${left}%`,
                width: `${widthPerWhite * 0.6}%`,
                height: '60%',
                top: 0,
              },
              'aria-label': `Jouer ${blackName}, ${blackNameFR}`,
            },
              h('span', { className: 'text-[9px] font-mono' },
                labelMode==='en' ? blackName.replace(/\d/,'') : (labelMode==='fr' ? blackNameFR.replace(/\d/,'') : (labelMode==='both' ? blackName.replace(/\d/,'') : ''))
              )
            );
          });
        })()
      )
    )
  );
}

/* Exercice interactif de la leçon 5 : composant séparé pour accéder au state tessiture */
function Lesson5Exercise() {
  const audio = useContext(AudioCtx);
  // Notes candidates pour voix masculines parlées : E2 (40) à G3 (55)
  // Fourchette large pour couvrir basse profonde (rare) à ténor parlant haut.
  const candidateMidis = [];
  for (let m = 40; m <= 55; m++) candidateMidis.push(m);

  const [selectedMidi, setSelectedMidi] = useState(null);
  const [saved, setSaved] = useState(false);

  const saveToTessiture = () => {
    try {
      const lsKey = 'chant.state.v1';
      const raw = localStorage.getItem(lsKey);
      if (!raw) return;
      const state = JSON.parse(raw);
      const info = midiToNoteName(selectedMidi);
      state.tessiture.notes.parlee_confortable = info.en;
      state.tessiture.date_evaluation = new Date().toISOString();
      state.tessiture.changelog.push({
        date: new Date().toISOString().slice(0, 10),
        entry: `Leçon 5 : note parlée confortable enregistrée = ${info.en} (${info.fr})`,
      });
      localStorage.setItem(lsKey, JSON.stringify(state));
      setSaved(true);
    } catch (e) {
      console.warn('Save tessiture failed', e);
    }
  };

  return h('div', { className: 'my-6 p-5 bg-soft/50 border border-rule rounded-sm' },
    h('ol', { className: 'space-y-4 text-[15px] leading-relaxed list-decimal list-inside' },

        h('strong', null, 'Tiens la syllabe « bon » '), 'sur environ 3 secondes, comme un « boooon » prolongé, sans effort, sans chanter — juste parler long.'

        h('strong', null, 'Compare avec les sons ci-dessous'),

      h('li', null,
        h('strong', null, 'Sélectionne ta note'),
        ' en cliquant sur son bouton, puis valide.'
      ),
    ),

    h('div', { className: 'mt-5 grid grid-cols-4 gap-2' },

/* Exercice interactif de la leçon 6 — sélection de plusieurs notes + hypothèse Fach */
function Lesson6Exercise() {
  const audio = useContext(AudioCtx);
  const [step, setStep] = useState(1);
  const [notes, setNotes] = useState({
    parlee_confortable: null,
    grave_limite_confortable: null,
    passaggio_pressenti_bas: null,
    aigu_limite_confortable_poitrine: null,
    aigu_limite_confortable_global: null,
  });
  const [saved, setSaved] = useState(false);

  // Préremplir avec note parlée si déjà identifiée en leçon 5
  useEffect(() => {
    try {
      const raw = localStorage.getItem('chant.state.v1');
      if (!raw) return;
      const s = JSON.parse(raw);
      if (s.tessiture?.notes?.parlee_confortable) {
        setNotes(prev => ({ ...prev, parlee_confortable: noteNameToMidi(s.tessiture.notes.parlee_confortable) }));
      }
    } catch {}
  }, []);

  // Gamme candidate : E1 (28) à A4 (69) pour couvrir de la basse profonde à un baryton aigu
  const makeRange = (min, max) => {
    const arr = [];
    for (let m = min; m <= max; m++) arr.push(m);
    return arr;
  };

  const hypotheseFach = useMemo(() => {
    if (!notes.passaggio_pressenti_bas) return null;
    const m = notes.passaggio_pressenti_bas;
    // Bozeman PVA Appendix 3 (approximations) :
    // Basse profonde : primo ~ A3, Basse : ~ Bb3-B3, Baryton : ~ C4-C#4, Ténor : ~ D4-Eb4+
    // Fiabilité Moyenne : ces fourchettes sont approximatives et se chevauchent.
    if (m <= 56) return { fach: 'Basse profonde ou Basse', confiance: 'moyenne' };     // ≤ G#3
    if (m <= 59) return { fach: 'Basse', confiance: 'moyenne' };                        // A3-B3
    if (m <= 62) return { fach: 'Basse-baryton ou Baryton', confiance: 'moyenne' };     // C4-D4
    if (m <= 64) return { fach: 'Baryton', confiance: 'moyenne' };                      // Eb4-E4
    if (m <= 67) return { fach: 'Baryton aigu ou Ténor', confiance: 'moyenne' };        // F4-G4
    return { fach: 'Ténor', confiance: 'faible (passaggio très haut, inhabituel — à vérifier)' };
  }, [notes.passaggio_pressenti_bas]);

  const allFilled = Object.values(notes).every(v => v !== null);

  const filledCount = Object.values(notes).filter(v => v !== null).length;

  const missingLabels = useMemo(() => {
    const labels = {
      parlee_confortable: 'note parlée',
      grave_limite_confortable: 'grave confortable',
      passaggio_pressenti_bas: 'passaggio pressenti',
      aigu_limite_confortable_poitrine: 'aigu en poitrine',
      aigu_limite_confortable_global: 'aigu global',
    };
    return Object.entries(notes).filter(([_, v]) => v === null).map(([k]) => labels[k]);
  }, [notes]);

  const saveAll = () => {
    try {
      const lsKey = 'chant.state.v1';
      const raw = localStorage.getItem(lsKey);
      if (!raw) return;
      const state = JSON.parse(raw);
      const notesNamed = {};
      for (const [k, v] of Object.entries(notes)) {
        notesNamed[k] = v !== null ? midiToNoteName(v).en : null;
      }
      // On conserve les autres champs déjà présents (aigu_limite_accessible, grave_limite_accessible)
      state.tessiture.notes = {
        ...state.tessiture.notes,
        ...notesNamed,
      };
      state.tessiture.date_evaluation = new Date().toISOString();
      if (hypotheseFach) {
        state.tessiture.hypothese_fach = hypotheseFach.fach;
        state.tessiture.fiabilite_estimation = `auto-évaluation, confiance ${hypotheseFach.confiance} — à confirmer avec enseignante`;
      }
      state.tessiture.changelog.push({
        date: new Date().toISOString().slice(0, 10),
        entry: `Leçon 6 : tessiture cartographiée. Hypothèse : ${hypotheseFach?.fach || 'non déterminée'}.`,
      });
      localStorage.setItem(lsKey, JSON.stringify(state));
      setSaved(true);
    } catch (e) {
      console.warn('Save tessiture failed', e);
    }
  };

  const NoteSelector = ({ label, explanation, field, min, max, hint }) => {
    const selected = notes[field];
    return h('div', { className: 'my-5 p-4 bg-soft/50 border border-rule rounded-sm' },
      h('div', { className: 'mb-2' },
        h('div', { className: 'font-medium text-[15px]' }, label),
        h('div', { className: 'text-xs text-dim mt-1 leading-relaxed' }, explanation),
        hint ? h('div', { className: 'text-[11px] text-dim mt-1 italic' }, hint) : null,
      ),
      h('div', { className: 'mt-3 grid grid-cols-6 sm:grid-cols-8 gap-1.5' },
        makeRange(min, max).map(m => {
          const info = midiToNoteName(m);
          const isSelected = selected === m;
          return h('div', { key: m, className: 'flex flex-col gap-0.5' },
            h('button', {
              onClick: () => audio.playMidi(m, 1.8),
              className: 'px-1 py-1 bg-paper border border-rule hover:border-ink rounded-sm text-[10px] font-mono',
            }, '▸'),
            h('button', {
              onClick: () => setNotes(prev => ({ ...prev, [field]: m })),
              className: `px-1 py-1 text-[10px] rounded-sm border transition-colors ${isSelected ? 'bg-ink text-paper border-ink' : 'bg-paper border-rule hover:border-dim'}`,
            }, info.en)
          );
        })
      ),
      selected !== null ? h('div', { className: 'mt-2 text-xs text-dim' },
        'Sélectionné : ', h('span', { className: 'font-mono font-medium text-ink' }, midiToNoteName(selected).en, ' / ', midiToNoteName(selected).fr)
      ) : null
    );
  };

  return h('section', { className: 'mt-8' },
    h('h2', { className: 'font-serif-display text-2xl text-ink mt-10 mb-4 tracking-tight' }, '2. Cartographie'),

    h('p', { className: 'text-sm text-dim leading-relaxed mb-4' },
      'Cinq notes à identifier successivement. La première (note parlée) est reprise de la leçon 5 si tu l\'as déjà faite, mais tu peux la modifier. Le résumé et le bouton d\'enregistrement n\'apparaîtront qu\'une fois les cinq notes renseignées.'
    ),

    h(NoteSelector, {
      label: '1. Ta note parlée confortable',
      explanation: 'Ta note parlée habituelle, identifiée en leçon 5. Tu peux la laisser telle quelle ou la modifier si tu la sens différemment aujourd\'hui.',
      hint: notes.parlee_confortable !== null ? 'Reprise de la leçon 5 — modifiable.' : 'Non identifiée. Va faire la leçon 5 d\'abord (ou sélectionne directement ici).',
      field: 'parlee_confortable',
      min: 40, max: 55, // E2 à G3
    }),

    h(NoteSelector, {
      label: '2. Ton grave confortable',
      explanation: 'Descends progressivement depuis ta note parlée. À quelle note ton son devient-il instable, soufflé, peu sonore, ou difficile à tenir ? Sélectionne la dernière note où tu es encore confortable.',
      hint: 'Pour information : il est normal que le son devienne soufflé en descendant. Cherche la limite du confort, pas la limite absolue.',
      field: 'grave_limite_confortable',
      min: 28, max: 55, // E1 à G3
    }),

    h(NoteSelector, {
      label: '3. Ton passaggio pressenti',
      explanation: 'Remonte progressivement depuis ta note parlée en chantant un « ah » ou « oh » relâché. À quelle note ressens-tu un premier changement : sensation de « basculer », tension nouvelle, timbre différent, impression que tu vas « craquer » ?',
      hint: 'Cette note est la plus importante de l\'exercice — elle conditionne l\'hypothèse de ton type de voix.',
      field: 'passaggio_pressenti_bas',
      min: 50, max: 67, // D3 à G4 (fourchette large)
    }),

    h(NoteSelector, {
      label: '4. Ton aigu en poitrine (avant la bascule)',
      explanation: 'La note la plus haute que tu peux tenir sans basculer dans un registre « plus léger/falsetto ». C\'est souvent un demi-ton ou un ton au-dessus de ton passaggio pressenti.',
      field: 'aigu_limite_confortable_poitrine',
      min: 52, max: 69, // E3 à A4
    }),

    h(NoteSelector, {
      label: '5. Ton aigu confortable global',
      explanation: 'La note la plus haute que tu peux produire de façon stable, tout registre confondu (y compris après la bascule, en voix de tête/falsetto).',
      hint: 'Ne pas pousser. Si ça force ou fait mal, arrête.',
      field: 'aigu_limite_confortable_global',
      min: 55, max: 72, // G3 à C5
    }),

    // Indicateur de progression visible en permanence
    h('div', { className: 'mt-6 p-3 border border-rule rounded-sm bg-soft/30 text-sm' },
      allFilled
        ? h('div', { className: 'text-accent font-medium' }, '✓ Cinq notes sélectionnées — ton résumé est prêt ci-dessous.')
        : h('div', { className: 'text-dim' },
            h('strong', { className: 'text-ink' }, filledCount, ' note', filledCount > 1 ? 's' : '', ' sur 5 sélectionnée', filledCount > 1 ? 's' : ''),
            '. ', missingLabels.length ? 'Il manque : ' + missingLabels.join(', ') + '.' : ''
          )
    ),

    allFilled ? h('div', { className: 'mt-6 p-5 border border-accent/40 bg-accent/5 rounded-sm' },
      h('h3', { className: 'font-serif-display text-xl mb-3' }, 'Résumé de ta cartographie'),
      h('ul', { className: 'space-y-1.5 text-sm mb-4' },
        Object.entries(notes).map(([k, v]) => {
          const labels = {
            parlee_confortable: '1. Note parlée confortable',
            grave_limite_confortable: '2. Grave confortable',
            passaggio_pressenti_bas: '3. Passaggio pressenti',
            aigu_limite_confortable_poitrine: '4. Aigu en poitrine',
            aigu_limite_confortable_global: '5. Aigu global',
          };
          return h('li', { key: k, className: 'flex items-baseline justify-between' },
            h('span', { className: 'text-ink' }, labels[k]),
            h('span', { className: 'font-mono font-medium' }, v !== null ? midiToNoteName(v).en + ' / ' + midiToNoteName(v).fr : '—')
          );
        })
      ),

      hypotheseFach ? h('div', { className: 'mt-4 pt-4 border-t border-accent/30' },
        h('div', { className: 'text-[11px] uppercase tracking-widest text-accent mb-2 font-sans' }, 'Hypothèse de type de voix'),
        h('p', { className: 'text-lg font-serif-display mb-2' }, hypotheseFach.fach),
        h('p', { className: 'text-xs text-dim leading-relaxed' },
          'Confiance : ', hypotheseFach.confiance, '. Basée sur Bozeman, ', h('em', null, 'Practical Vocal Acoustics'), ', Appendix 3 (localisations statistiques du passaggio par Fach masculin). ',
          h('strong', null, 'À confirmer avec ton enseignante.'),
          ' Les auto-évaluations de tessiture sont fréquemment imprécises — attends-toi à ce que cette hypothèse soit ajustée après discussion et après quelques semaines de pratique.'

      ) : null,

      !saved ? h('button', {
        onClick: saveAll,
        className: 'mt-4 w-full px-4 py-2.5 bg-ink text-paper rounded-sm text-sm hover:bg-dim',
      }, 'Enregistrer ma cartographie') : h('div', { className: 'mt-4 p-3 bg-green-50 border border-green-200 rounded-sm text-sm text-green-900' },
        '✓ Enregistré en local. Clique sur « Exporter » (en haut à droite) pour télécharger les JSON et les versionner dans ton repo.'
      )
    ) : null
  );
}

/* ============================================================
   COMPOSANT — Schéma anatomique interactif (3 zones)
   ============================================================ */

function AnatomySchema({ onZoneClick }) {
  const [activeZone, setActiveZone] = useState(null);

  const zones = {
    resonateurs: {
      label: 'Résonateurs',
      description: 'Pharynx (arrière-gorge), cavité buccale, cavités nasales. Colorent et amplifient le son produit par les cordes vocales.',
      color: '#8b3a1f',
    },
    vibrateur: {
      label: 'Vibrateur',
      description: 'Le larynx, qui contient les cordes vocales. Source primaire du son.',
      color: '#c56b44',
    },
    soufflerie: {
      label: 'Soufflerie',
      description: 'Poumons et muscles respiratoires (diaphragme, intercostaux, abdominaux). Fournit et régule le flux d\'air.',
      color: '#d4a373',
    },
  };

  const handleZoneClick = (key) => {
    setActiveZone(activeZone === key ? null : key);
    if (onZoneClick) onZoneClick(key);
  };

  const isActive = (key) => activeZone === key;
  const baseOpacity = (key) => (activeZone === null || activeZone === key ? 1 : 0.3);

  return h('div', { className: 'my-6' },
    h('div', { className: 'flex flex-col lg:flex-row gap-6 items-start' },
      // Colonne SVG
      h('div', { className: 'flex-shrink-0 mx-auto lg:mx-0' },
        h('svg', {
          viewBox: '0 0 200 360',
          width: '200',
          height: '360',
          style: { maxWidth: '100%', height: 'auto' },
          'aria-label': 'Schéma simplifié de l\'appareil vocal',
        },
          // Résonateurs : tête stylisée (ovale + cavités)
          h('g', {
            onClick: () => handleZoneClick('resonateurs'),
            style: { cursor: 'pointer', opacity: baseOpacity('resonateurs') },
          },
            // Crâne/tête
            h('ellipse', {
              cx: 100, cy: 55, rx: 45, ry: 50,
              fill: isActive('resonateurs') ? zones.resonateurs.color : '#f0e5d4',
              stroke: '#1a1814', strokeWidth: 1.5,
            }),
            // Cavité nasale (petite ellipse)
            h('ellipse', { cx: 100, cy: 50, rx: 12, ry: 8, fill: 'none', stroke: '#1a1814', strokeWidth: 1, strokeDasharray: '2,2' }),
            // Cavité buccale (ligne bouche)
            h('path', { d: 'M 85 80 Q 100 85 115 80', fill: 'none', stroke: '#1a1814', strokeWidth: 1.2 }),
            // Pharynx (ellipse verticale)
            h('ellipse', { cx: 100, cy: 95, rx: 8, ry: 14, fill: 'none', stroke: '#1a1814', strokeWidth: 1, strokeDasharray: '2,2' }),
            h('text', {
              x: 155, y: 55, fill: '#1a1814', fontSize: '11', fontFamily: 'serif',
              style: { pointerEvents: 'none', userSelect: 'none' },
            }, 'Résonateurs'),
          ),

          // Cou + larynx (vibrateur)
          h('g', {
            onClick: () => handleZoneClick('vibrateur'),
            style: { cursor: 'pointer', opacity: baseOpacity('vibrateur') },
          },
            // Cou
            h('rect', {
              x: 85, y: 105, width: 30, height: 40,
              fill: isActive('vibrateur') ? zones.vibrateur.color : '#f0e5d4',
              stroke: '#1a1814', strokeWidth: 1.5,
            }),
            // Pomme d'Adam (saillie sur le cou)
            h('path', {
              d: 'M 85 118 L 80 125 L 85 132',
              fill: 'none', stroke: '#1a1814', strokeWidth: 1.5,
            }),
            // Petite marque cordes vocales horizontales
            h('line', { x1: 90, y1: 128, x2: 110, y2: 128, stroke: '#1a1814', strokeWidth: 0.8 }),

          },
            // Thorax (forme en cloche pour suggérer cage thoracique)
            h('path', {

              d: 'M 60 220 Q 100 230 140 220',

            }),
            // Abdomen
            h('path', {
              d: 'M 60 220 Q 55 260 65 300 L 135 300 Q 145 260 140 220 Z',
              fill: isActive('soufflerie') ? zones.soufflerie.color : '#f0e5d4',

        ) : h('div', { className: 'p-4 border border-dashed border-rule rounded-sm text-dim leading-relaxed' },
          h('p', null, 'Les trois zones fonctionnent ensemble : la ',
            h('strong', { className: 'text-ink' }, 'soufflerie'),
            ' fournit l\'air, le ',
            h('strong', { className: 'text-ink' }, 'vibrateur'),
            ' le transforme en son brut, les ',
            h('strong', { className: 'text-ink' }, 'résonateurs'),
            ' lui donnent son timbre et les voyelles.'
          )
        )
      )
    ),
    h('p', { className: 'text-[11px] text-dim italic mt-3' },
      'Schéma très simplifié. Pour les illustrations anatomiques détaillées, voir McCoy ', h('em', null, 'Your Voice'), ' (chapitres 7-10).'
    )
  );
}

/* ============================================================
   COMPOSANTS RÉUTILISABLES
   ============================================================ */

function QuizBlock({ question, options, audioOptions, correctId, explanation, state, setState }) {
  const audio = useContext(AudioCtx);
  const chosen = state?.chosen;
  const submitted = state?.submitted;

  return h('div', { className: 'p-5 border border-rule rounded-sm bg-paper' },
    h('p', { className: 'font-medium text-[15px] mb-4' }, question),
    h('div', { className: 'space-y-2' },
      (options || []).map(o => {
        const isChosen = chosen === o.id;
        const isCorrect = submitted && o.id === correctId;
        const isWrong = submitted && isChosen && o.id !== correctId;
        return h('button', {
          key: o.id,
          onClick: () => !submitted && setState({ chosen: o.id, submitted: false }),
          disabled: submitted,
          className: `w-full text-left px-3 py-2 border rounded-sm transition-colors text-sm ${
            isCorrect ? 'bg-green-50 border-green-400' :
            isWrong ? 'bg-red-50 border-red-400' :
            isChosen ? 'bg-soft border-ink' : 'bg-paper border-rule hover:border-dim'
          }`,
        }, o.label);
      }),
      (audioOptions || []).map(o => {
        const isChosen = chosen === o.id;
        const isCorrect = submitted && o.id === correctId;
        const isWrong = submitted && isChosen && o.id !== correctId;
        return h('div', { key: o.id, className: 'flex gap-2 items-center' },
          h('button', {
            onClick: () => audio.playMidi(o.midi, 1.5),
            className: 'flex-shrink-0 px-3 py-2 bg-paper border border-rule hover:border-ink rounded-sm font-mono text-xs',
          }, '▸'),
          h('button', {
            onClick: () => !submitted && setState({ chosen: o.id, submitted: false }),
            disabled: submitted,
            className: `flex-1 text-left px-3 py-2 border rounded-sm transition-colors text-sm ${
              isCorrect ? 'bg-green-50 border-green-400' :
              isWrong ? 'bg-red-50 border-red-400' :
              isChosen ? 'bg-soft border-ink' : 'bg-paper border-rule hover:border-dim'
            }`,
          }, o.label)
        );
      }),
    ),
    chosen && !submitted ? h('button', {
      onClick: () => setState({ ...state, submitted: true }),
      className: 'mt-4 px-4 py-2 bg-ink text-paper rounded-sm text-sm hover:bg-dim transition-colors',
    }, 'Valider') : null,
    submitted ? h('div', { className: `mt-4 p-3 rounded-sm text-sm leading-relaxed ${chosen === correctId ? 'bg-green-50 text-green-900' : 'bg-soft text-ink'}` },
      h('div', { className: 'font-medium mb-1' }, chosen === correctId ? '✓ Correct' : '→ La bonne réponse était une autre'),
      h('div', null, explanation)
    ) : null
  );
}

                  h('div', { className: 'text-xs text-dim mt-0.5 truncate' }, lesson.sousTitre),
                  h('div', { className: 'text-[11px] text-dim mt-1 font-mono' }, '≈ ', lesson.dureeMinutes, ' min')
                )
              );
            })
          ) : null
        );
      })
    )
  );
}

function LessonView({ lessonId, progression, setProgression, onBack }) {
  const lesson = LESSONS[lessonId];
  const tts = useTTS();
  const [showTTSPanel, setShowTTSPanel] = useState(false);
  const [ttsActive, setTTSActive] = useState(false);
  const contentRef = useRef(null);

  // Marquer comme démarrée
  useEffect(() => {
    if (!lesson) return;
    const current = progression.lecons[lessonId];
    // Protection défensive : si la leçon n'a pas d'entrée progression (migration pas encore
    // appliquée, race condition), on ne fait rien plutôt que de planter.
    if (!current) return;
    if (current.statut === 'non_demarree') {
      setProgression(prev => ({
        ...prev,
        lecon_courante: lessonId,
        lecons: {
          ...prev.lecons,
          [lessonId]: {
            ...prev.lecons[lessonId],
            statut: 'en_cours',
            date_demarrage: new Date().toISOString(),
          },
        },
      }));
    }
  }, [lessonId]);

  const handleComplete = useCallback((id) => {
    setProgression(prev => ({
      ...prev,
      lecons: {
        ...prev.lecons,
        [id]: {
          // Défensif : si l'entrée n'existe pas, on initialise avec les champs attendus
          statut: 'non_demarree',
          date_demarrage: null,
          date_completion: null,
          duree_reelle_minutes: null,
          ...prev.lecons[id],
          statut: 'completee',
          date_completion: new Date().toISOString(),
        },
      },
    }));
  }, [setProgression]);

  const playTTS = () => {
    if (!contentRef.current) return;
    const text = contentRef.current.innerText;
    tts.speak(text);
    setTTSActive(true);
  };

  const stopTTS = () => {
    tts.stop();
    setTTSActive(false);
  };

  if (!lesson) return h('div', null, 'Leçon introuvable.');

  const Renderer = lesson.render;

  return h('div', { className: 'py-6 sm:py-10 px-4 sm:px-6 max-w-3xl mx-auto fade-in' },
    // Header leçon
    h('header', { className: 'mb-10 no-print' },
      h('button', {
        onClick: onBack,
        className: 'text-sm text-dim hover:text-ink transition-colors mb-6 inline-flex items-center gap-1',
      }, '← ', 'Retour au parcours'),

      h('div', { className: 'flex items-baseline gap-3 mb-3' },
        h('span', { className: 'font-mono text-xs text-accent uppercase tracking-widest' }, 'Bloc 1 · Leçon ', lesson.numero),
        h('span', { className: 'font-mono text-xs text-dim' }, '≈ ', lesson.dureeMinutes, ' min')
      ),
      h('h1', { className: 'font-serif-display text-3xl sm:text-4xl leading-tight mb-2' }, lesson.titre),
      h('p', { className: 'text-dim text-[15px] font-serif-body italic' }, lesson.sousTitre),

      // Barre TTS
      h('div', { className: 'mt-6 flex flex-wrap items-center gap-2' },
        h('button', {
          onClick: ttsActive ? stopTTS : playTTS,
          className: 'px-3 py-1.5 text-xs border border-rule hover:border-ink bg-paper rounded-sm transition-colors flex items-center gap-1.5',
          title: 'Lecture audio de la leçon (voix Apple)',
        }, ttsActive ? '■ Arrêter' : '▸ Écouter la leçon'),
        h('button', {
          onClick: () => setShowTTSPanel(!showTTSPanel),
          className: 'px-2 py-1.5 text-xs text-dim hover:text-ink transition-colors',
        }, 'voix ⌄'),
      ),
      showTTSPanel ? h('div', { className: 'mt-2 p-3 bg-soft/40 border border-rule rounded-sm text-xs' },
        h('div', { className: 'text-dim mb-2' }, 'Les termes techniques anglais (voce chiusa, F1, H2…) seront mal prononcés par la synthèse vocale. Utilisable pour ré-écoute, pas pour apprentissage initial.'),
        h('div', { className: 'flex flex-wrap gap-1' },
          tts.voices.map(v => h('button', {
            key: v.name,
            onClick: () => tts.setPreferredVoiceName(v.name),
            className: `px-2 py-1 text-[11px] border rounded transition-colors ${tts.preferredVoiceName === v.name ? 'bg-ink text-paper border-ink' : 'bg-paper border-rule hover:border-dim'}`,
          }, v.name))
        )
      ) : null
    ),

    // Objectif et sources
    h('div', { className: 'mb-10 p-4 bg-soft/40 border border-rule rounded-sm text-sm no-print' },
      h('div', { className: 'mb-3' },
        h('div', { className: 'text-[10px] uppercase tracking-widest text-accent mb-1 font-sans' }, 'Objectif'),
        h('p', { className: 'text-ink leading-relaxed' }, lesson.objectif)
      ),
      lesson.sources.length ? h('div', null,
        h('div', { className: 'text-[10px] uppercase tracking-widest text-accent mb-1 mt-3 font-sans' }, 'Sources mobilisées'),
        h('ul', { className: 'space-y-1 text-xs' },
          lesson.sources.map((s, i) => h('li', { key: i, className: 'text-dim leading-relaxed' },
            h('span', { className: 'font-medium text-ink' }, s.auteur),
            ', ',
            h('em', { className: 'font-serif-body italic' }, s.ouvrage),
            ' — ',
            s.pages,
            s.note ? h('span', { className: 'block ml-2 mt-0.5' }, s.note) : null
          ))
        )
      ) : null
    ),

    // Corps de la leçon
    h('div', { ref: contentRef, className: 'font-serif-body' },
      h(Renderer, { onComplete: handleComplete, lesson })
    )
  );
}

// Données du glossaire. Hardcodées : le glossaire évolue avec les leçons,
// pas avec l'usage utilisateur, donc pas de raison de le stocker en JSON séparé.
// Chaque entrée : terme, définition, première leçon d'introduction,
// auteurs qui en parlent, catégorie (musique / anatomie / acoustique / pédagogie)
const GLOSSARY = [
  // Musique
  { terme: 'Fréquence', categorie: 'musique', definition: 'Nombre de vibrations par seconde, mesuré en Hertz (Hz). 1 Hz = 1 oscillation par seconde. Grandeur physique objective.', introLecon: 'bloc1-s1-l1', sources: [{ auteur: 'McCoy', reference: 'Ch. 2, p. 17-19' }] },
  { terme: 'Hauteur', categorie: 'musique', definition: 'Perception subjective de la fréquence par le cerveau. Liée à la fréquence mais pas identique — peut être influencée par le timbre, l\'intensité, le contexte.', introLecon: 'bloc1-s1-l1', sources: [{ auteur: 'McCoy', reference: 'Ch. 2, p. 17-18' }] },
  { terme: 'Hertz (Hz)', categorie: 'musique', definition: 'Unité de mesure de la fréquence. 1 Hz = 1 oscillation par seconde. Le La du diapason vibre à 440 Hz (A4 = 440 Hz, standard international).', introLecon: 'bloc1-s1-l1', sources: [{ auteur: 'McCoy', reference: 'Ch. 2' }] },
  { terme: 'Note', categorie: 'musique', definition: 'Son dont la fréquence a reçu un nom dans un système musical. Par convention internationale, A4 = 440 Hz.', introLecon: 'bloc1-s1-l1' },
  { terme: 'Octave', categorie: 'musique', definition: 'Intervalle entre deux notes dont les fréquences sont dans un rapport 2:1. La note supérieure est perçue comme « la même » note, plus aiguë. Exemple : C3 (131 Hz) → C4 (262 Hz) → C5 (524 Hz).', introLecon: 'bloc1-s1-l2', sources: [{ auteur: 'McCoy', reference: 'Ch. 2' }] },
  { terme: 'Demi-ton', categorie: 'musique', definition: 'Plus petite distance entre deux notes dans le système musical occidental. Correspond au passage d\'une touche à la touche adjacente sur le clavier. Une octave contient 12 demi-tons.', introLecon: 'bloc1-s1-l3' },
  { terme: 'Ton', categorie: 'musique', definition: 'Intervalle équivalent à deux demi-tons. Exemple : C4 → D4.', introLecon: 'bloc1-s1-l3' },
  { terme: 'Intervalle', categorie: 'musique', definition: 'Distance entre deux notes, mesurable en demi-tons ou par un nom musical (octave, quinte, tierce, etc.).', introLecon: 'bloc1-s1-l4' },
  { terme: 'Quinte juste', categorie: 'musique', definition: 'Intervalle de 7 demi-tons, ratio de fréquence 3:2. Exemple : C4 → G4. Considéré comme une consonance fondamentale.', introLecon: 'bloc1-s1-l4' },
  { terme: 'Quarte juste', categorie: 'musique', definition: 'Intervalle de 5 demi-tons, ratio 4:3. Exemple : C4 → F4.', introLecon: 'bloc1-s1-l4' },
  { terme: 'Tierce majeure / mineure', categorie: 'musique', definition: 'Tierce majeure : 4 demi-tons (C4 → E4). Tierce mineure : 3 demi-tons (C4 → Eb4). Le type de tierce détermine le caractère majeur ou mineur d\'un accord ou d\'une gamme.', introLecon: 'bloc1-s1-l4' },
  { terme: 'Gamme majeure', categorie: 'musique', definition: 'Séquence de 7 notes dans une octave suivant le pattern Ton-Ton-Demi-ton-Ton-Ton-Ton-Demi-ton. Gamme la plus répandue en musique occidentale tonale.', introLecon: 'bloc1-s1-l4' },

  // Physique / acoustique
  { terme: 'Fréquence fondamentale (F0)', categorie: 'acoustique', definition: 'Fréquence de vibration des cordes vocales à un instant donné. En voix parlée, F0 change constamment autour d\'une valeur moyenne (la « note parlée confortable »).', introLecon: 'bloc1-s1-l5', sources: [{ auteur: 'McCoy', reference: 'Ch. 2' }] },

  // Pédagogie vocale — termes de base (vocabulaire d'arrivée anticipée)
  { terme: 'Registre', categorie: 'pedagogie', definition: 'Manière dont les cordes vocales vibrent à un moment donné. Plusieurs registres coexistent (poitrine, tête, falsetto) avec des configurations musculaires distinctes. Le passage de l\'un à l\'autre produit une bascule audible et sensible. Traité en profondeur au Bloc 2.', introLecon: 'bloc1-s1-l5', sources: [{ auteur: 'McCoy', reference: 'Ch. 6' }, { auteur: 'Bozeman', reference: 'PVA, Ch. 1' }], noteApprofondissement: 'À approfondir au Bloc 2 (anatomie) et Bloc 4 (acoustique).' },
  { terme: 'Voix de poitrine', categorie: 'pedagogie', definition: 'Registre bas, utilisé dans la voix parlée. Vibrations perçues comme venant du thorax. Son plus "plein", "corporel". Désigne une perception, pas un organe anatomique précis.', introLecon: 'bloc1-s1-l5', sources: [{ auteur: 'Henny', reference: 'ch. "Where Registers Occur"' }], noteApprofondissement: 'Corrélat acoustique : open timbre. Corrélat musculaire : domination du TA (thyroaryténoïdien). À approfondir au Bloc 2.' },
  { terme: 'Voix de tête', categorie: 'pedagogie', definition: 'Registre haut. Vibrations perçues comme venant du haut du crâne. Son plus léger qu\'en voix de poitrine. En pédagogie classique, parfois distinguée du falsetto (voix de tête = plus consistante, falsetto = plus légère et soufflée), mais la frontière est floue.', introLecon: 'bloc1-s1-l5', noteApprofondissement: 'Corrélat musculaire : domination du CT (crico-thyroïdien). À approfondir au Bloc 2.' },
  { terme: 'Falsetto', categorie: 'pedagogie', definition: 'Registre très léger au-dessus du passaggio, souvent perçu comme soufflé ou "faux". Vient de l\'italien pour "faux". Chez les hommes, c\'est le registre accessible quand on imite une voix féminine.', introLecon: 'bloc1-s1-l5', sources: [{ auteur: 'Henny', reference: 'ch. "Where Registers Occur"' }] },
  { terme: 'Passaggio', categorie: 'pedagogie', definition: 'Mot italien signifiant "passage". Désigne la zone — pas un point unique — où la voix bascule du registre de poitrine vers le registre de tête. Chez les voix masculines, statistiquement autour de C4-G4 selon le type de voix.', introLecon: 'bloc1-s1-l5', sources: [{ auteur: 'Bozeman', reference: 'PVA, Ch. 7 + glossaire' }], noteApprofondissement: 'Traitement acoustique complet au Bloc 4 (F1/H2 crossing, voce aperta/chiusa).' },
  { terme: 'Primo passaggio', categorie: 'pedagogie', definition: 'Entrée basse de la zone de passaggio. Chez un baryton, typiquement autour de C4. À approfondir au Bloc 4.', introLecon: 'bloc1-s1-l6', sources: [{ auteur: 'Bozeman', reference: 'PVA, glossaire + Appendix 3' }] },
  { terme: 'Secondo passaggio', categorie: 'pedagogie', definition: 'Sortie haute de la zone de passaggio, entrée dans le registre aigu. Chez un baryton, typiquement autour de E4-F4. Chez un ténor, F#4-G4.', introLecon: 'bloc1-s1-l6', sources: [{ auteur: 'Bozeman', reference: 'PVA, glossaire + Appendix 3' }] },
  { terme: 'Zona di passaggio', categorie: 'pedagogie', definition: 'Zone de transition entre primo et secondo passaggio. Environ une quarte ou une quinte chez les voix masculines. C\'est dans cette zone que se fait la bascule progressive entre registres.', introLecon: 'bloc1-s1-l6', sources: [{ auteur: 'Bozeman', reference: 'PVA, glossaire' }] },
  { terme: 'Tessiture', categorie: 'pedagogie', definition: 'Étendue totale des notes qu\'une voix peut produire de façon stable et confortable, de la note la plus basse à la note la plus haute. À distinguer de l\'étendue absolue (notes extrêmes atteignables avec effort), qui est plus large.', introLecon: 'bloc1-s1-l5' },
  { terme: 'Timbre', categorie: 'pedagogie', definition: 'Qualité d\'un son qui le distingue d\'un autre à hauteur et volume égaux. Un "la" de piano, de violon et de voix humaine ne se confondent pas même à la même fréquence. Le timbre change dans une même voix selon les voyelles et les registres.', introLecon: 'bloc1-s1-l5' },
  { terme: 'Type de voix (Fach)', categorie: 'pedagogie', definition: 'Classification des voix selon leur tessiture et leur couleur. Voix masculines : basse profonde, basse, basse-baryton, baryton, baryton aigu, ténor. "Fach" est le terme allemand, repris dans la littérature internationale. Les catégories se chevauchent.', introLecon: 'bloc1-s1-l6', sources: [{ auteur: 'Bozeman', reference: 'PVA, Appendix 3' }] },

  // Anatomie — Bloc 2
  { terme: 'Appareil vocal', categorie: 'anatomie', definition: 'Ensemble des structures corporelles impliquées dans la production vocale. On le divise fonctionnellement en trois zones : soufflerie (poumons + muscles respiratoires), vibrateur (larynx + cordes vocales), résonateurs (pharynx, bouche, cavités nasales).', introLecon: 'bloc2-s1-l1', sources: [{ auteur: 'McCoy', reference: 'Ch. 7-10' }] },
  { terme: 'Soufflerie', categorie: 'anatomie', definition: 'Zone inférieure de l\'appareil vocal : poumons + muscles respiratoires (diaphragme, intercostaux, abdominaux). Fournit et régule le flux d\'air qui met les cordes vocales en vibration. Analogie : c\'est le "soufflet" d\'un orgue.', introLecon: 'bloc2-s1-l1' },
  { terme: 'Vibrateur', categorie: 'anatomie', definition: 'Zone moyenne de l\'appareil vocal : le larynx, qui contient les cordes vocales. Source primaire du son — l\'équivalent des anches dans un hautbois ou des cordes d\'un violon.', introLecon: 'bloc2-s1-l1' },
  { terme: 'Résonateurs', categorie: 'anatomie', definition: 'Zone supérieure de l\'appareil vocal : pharynx (arrière-gorge), cavité buccale, cavités nasales. Ces espaces amplifient sélectivement certaines fréquences du son brut produit par les cordes vocales, donnant au son son timbre et permettant de former les voyelles.', introLecon: 'bloc2-s1-l1', noteApprofondissement: 'Traitement acoustique complet au Bloc 3 (formants, source-filtre).' },
  { terme: 'Diaphragme', categorie: 'anatomie', definition: 'Muscle en forme de coupole qui sépare le thorax (poumons, cœur) de l\'abdomen (estomac, foie, intestins). Principal muscle de l\'inspiration : en se contractant, il s\'aplatit vers le bas, ce qui augmente le volume de la cage thoracique et aspire l\'air dans les poumons.', introLecon: 'bloc2-s1-l2', sources: [{ auteur: 'McCoy', reference: 'Ch. 8, p. 88-90' }, { auteur: 'Dayme', reference: 'Ch. 6, p. 68-71' }] },
  { terme: 'Intercostaux (muscles)', categorie: 'anatomie', definition: 'Muscles situés entre les côtes. Deux couches : intercostaux externes (principalement inspiratoires — soulèvent les côtes et élargissent le thorax) et intercostaux internes (principalement expiratoires — abaissent les côtes). Leur antagonisme permet de réguler finement le débit d\'air pendant le chant.', introLecon: 'bloc2-s1-l2', sources: [{ auteur: 'McCoy', reference: 'Ch. 8, p. 90-92' }] },
  { terme: 'Muscles abdominaux', categorie: 'anatomie', definition: 'Ensemble de muscles de la paroi abdominale : rectus abdominis (les "tablettes"), obliques externes et internes, transverse. Acteurs principaux de l\'expiration active. En se contractant, ils pressent les viscères contre le diaphragme, ce qui expulse l\'air des poumons.', introLecon: 'bloc2-s1-l2', sources: [{ auteur: 'McCoy', reference: 'Ch. 8, p. 92-95' }] },
  { terme: 'Cage thoracique', categorie: 'anatomie', definition: 'Structure osseuse formée par les 12 paires de côtes, le sternum à l\'avant, et les vertèbres thoraciques à l\'arrière. Elle protège les poumons et le cœur, et son volume varie lors de la respiration.', introLecon: 'bloc2-s1-l2' },
  { terme: 'Poumons', categorie: 'anatomie', definition: 'Organes spongieux logés dans la cage thoracique. Ils n\'ont aucun muscle propre — leur remplissage et vidage dépendent entièrement des muscles respiratoires qui modifient le volume du thorax.', introLecon: 'bloc2-s1-l2' },
  { terme: 'Antagonisme musculaire', categorie: 'anatomie', definition: 'Interaction entre deux muscles ou groupes musculaires qui tirent dans des directions opposées, permettant un contrôle fin du mouvement. En respiration chantée : les muscles inspiratoires (diaphragme, intercostaux externes) continuent de travailler même pendant l\'expiration, pour ralentir le mouvement expiratoire des muscles abdominaux.', introLecon: 'bloc2-s1-l2', noteApprofondissement: 'Concept central pour comprendre le "soutien" (leçon 2-3).' },
  { terme: 'Pression sous-glottique', categorie: 'anatomie', definition: 'Pression de l\'air sous la glotte (sous les cordes vocales), créée par l\'expiration quand les cordes sont partiellement ou totalement fermées. C\'est cette pression qui met les cordes vocales en vibration. Son niveau détermine en grande partie l\'intensité du son.', introLecon: 'bloc2-s1-l2', sources: [{ auteur: 'Dayme', reference: 'Ch. 6, p. 84-86' }], noteApprofondissement: 'Concept transversal : Bloc 2 (physiologie), Bloc 4 (acoustique).' },
];

// Index des termes du glossaire pour lookup rapide (construit à partir de GLOSSARY)
const glossaryIndex = () => {
  const idx = {};
  for (const entry of GLOSSARY) {
    idx[entry.terme.toLowerCase()] = entry;
  }
  return idx;
};

let _glossaryIndexCache = null;
function getGlossaryEntry(termeKey) {
  if (!_glossaryIndexCache) _glossaryIndexCache = glossaryIndex();
  return _glossaryIndexCache[termeKey.toLowerCase()] || null;
}

function Term({ children, k }) {
  // k (optionnel) = clé du glossaire si différente du texte affiché
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const key = k || (typeof children === 'string' ? children : null);
  const entry = key ? getGlossaryEntry(key) : null;

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    const esc = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', handler);
    document.addEventListener('keydown', esc);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('keydown', esc);
    };
  }, [open]);

  if (!entry) {
    // Pas d'entrée glossaire pour ce terme, on rend le texte seul
    return children;
  }

  return h('span', { ref, className: 'relative inline' },
    h('button', {
      onClick: () => setOpen(!open),
      className: 'underline decoration-dotted decoration-accent/60 underline-offset-2 hover:decoration-solid hover:decoration-accent transition-all cursor-help',
      'aria-label': `Définition de ${entry.terme}`,
      'aria-expanded': open,
    }, children),
    open ? h('span', {
      className: 'absolute z-40 left-0 top-full mt-1 w-[min(320px,calc(100vw-2rem))] bg-paper border border-ink rounded-sm shadow-lg p-3 text-left text-[13px] leading-relaxed font-sans',
      style: { maxWidth: 'calc(100vw - 2rem)' },
    },
      h('span', { className: 'flex items-baseline justify-between mb-1.5' },
        h('span', { className: 'font-medium text-ink' }, entry.terme),
        h('button', {
          onClick: (e) => { e.stopPropagation(); setOpen(false); },
          className: 'text-dim hover:text-ink text-lg leading-none ml-2',
          'aria-label': 'Fermer',
        }, '×')
      ),
      h('span', { className: 'block text-ink' }, entry.definition),
      entry.noteApprofondissement ? h('span', { className: 'block text-dim italic text-[12px] mt-1.5' },
        '→ ', entry.noteApprofondissement
      ) : null,
      entry.sources && entry.sources.length > 0 ? h('span', { className: 'block text-[11px] text-dim mt-1.5 pt-1.5 border-t border-rule' },
        entry.sources.map(s => `${s.auteur} (${s.reference})`).join(' · ')
      ) : null,
    ) : null
  );
}


function GlossaryView({ onClose, onNavigateToLesson }) {
  const [searchQuery, setSearchQuery] = useState('');

  const categories = [

  const filtered = useMemo(() => {
    const q = searchQuery.toLowerCase().trim();

        'Termes introduits dans le parcours. Chaque entrée indique la leçon où le terme est introduit et les auteurs du corpus qui en parlent. Certains termes (marqués "à approfondir") reçoivent ici une définition minimale avant un traitement plus complet dans un bloc ultérieur.'
      ),

      h('div', { className: 'mb-6 space-y-3' },
        h('input', {

          value: searchQuery,
          onChange: e => setSearchQuery(e.target.value),
          className: 'w-full px-3 py-2 border border-rule rounded-sm text-sm bg-paper',

function JournalView({ journal, setJournal, onClose }) {
  const [showForm, setShowForm] = useState(false);
  const [draft, setDraft] = useState({
    type: 'lecon',
    lecon_associee: '',
    duree_minutes: '',
    notes_libres: '',
    ressentis_vocaux: '',
    questions_pour_claude: '',
  });

  const addEntry = () => {
    const entry = {
      id: crypto.randomUUID(),
      date: new Date().toISOString(),
      ...draft,
      duree_minutes: draft.duree_minutes ? parseInt(draft.duree_minutes) : null,
      vocabulaire_enseignante: [],
    };
    setJournal(prev => ({
      ...prev,
      entries: [entry, ...prev.entries],
    }));
    setDraft({ type: 'lecon', lecon_associee: '', duree_minutes: '', notes_libres: '', ressentis_vocaux: '', questions_pour_claude: '' });
    setShowForm(false);
  };

  return h('div', { className: 'fixed inset-0 bg-paper z-50 overflow-y-auto' },
    h('div', { className: 'max-w-2xl mx-auto py-8 px-4 sm:px-6' },
      h('div', { className: 'flex items-center justify-between mb-8' },
        h('h2', { className: 'font-serif-display text-3xl' }, 'Journal'),
        h('button', { onClick: onClose, className: 'text-sm text-dim hover:text-ink' }, '✕ Fermer')
      ),

      !showForm ? h('button', {
        onClick: () => setShowForm(true),
        className: 'w-full mb-6 p-4 border border-dashed border-rule hover:border-ink rounded-sm text-left text-sm text-dim hover:text-ink transition-colors',
      }, '+ Nouvelle entrée') : h('div', { className: 'mb-6 p-5 border border-rule rounded-sm space-y-3' },
        h('div', { className: 'flex gap-2' },
          ['lecon','pratique_libre','cours_enseignante'].map(t => h('button', {
            key: t,
            onClick: () => setDraft({ ...draft, type: t }),
            className: `px-3 py-1 text-xs rounded-sm border transition-colors ${draft.type === t ? 'bg-ink text-paper border-ink' : 'bg-paper border-rule hover:border-dim'}`,
          }, t.replace('_',' ')))
        ),
        h('input', {
          type: 'number', placeholder: 'Durée (min, optionnel)', value: draft.duree_minutes,
          onChange: e => setDraft({ ...draft, duree_minutes: e.target.value }),
          className: 'w-full px-3 py-2 border border-rule rounded-sm text-sm bg-paper',
        }),
        h('textarea', {
          placeholder: 'Notes libres',
          value: draft.notes_libres,
          onChange: e => setDraft({ ...draft, notes_libres: e.target.value }),
          className: 'w-full px-3 py-2 border border-rule rounded-sm text-sm bg-paper resize-y min-h-[80px]',
        }),
        h('textarea', {
          placeholder: 'Ressentis vocaux (sensations, difficultés)',
          value: draft.ressentis_vocaux,
          onChange: e => setDraft({ ...draft, ressentis_vocaux: e.target.value }),
          className: 'w-full px-3 py-2 border border-rule rounded-sm text-sm bg-paper resize-y min-h-[80px]',
        }),
        h('textarea', {
          placeholder: 'Questions pour Claude (optionnel)',
          value: draft.questions_pour_claude,
          onChange: e => setDraft({ ...draft, questions_pour_claude: e.target.value }),
          className: 'w-full px-3 py-2 border border-rule rounded-sm text-sm bg-paper resize-y min-h-[60px]',
        }),
        h('div', { className: 'flex gap-2' },
          h('button', { onClick: addEntry, className: 'px-4 py-2 bg-ink text-paper rounded-sm text-sm hover:bg-dim' }, 'Enregistrer'),
          h('button', { onClick: () => setShowForm(false), className: 'px-4 py-2 border border-rule rounded-sm text-sm hover:border-dim' }, 'Annuler')
        )
      ),

      journal.entries.length === 0 ? h('p', { className: 'text-dim text-sm text-center py-12 italic' }, 'Aucune entrée pour le moment.') :
        h('div', { className: 'space-y-4' },

/* ============================================================
   APP ROOT
   ============================================================ */

function App() {
  const audio = useContext(AudioCtx);
  const [state, setState] = useState(null); // null = en cours de chargement
  const [view, setView] = useState({ type: 'overview' }); // overview | lesson | journal
  const [showExport, setShowExport] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showGlossary, setShowGlossary] = useState(false);
  const [needsAudioActivation, setNeedsAudioActivation] = useState(true);

  // Chargement initial : merge localStorage + JSON du repo, puis migration automatique.
  // La migration ajoute les entries manquantes dans progression.lecons pour les leçons
  // nouvellement introduites dans LESSON_ORDER (ex : ajout du Bloc 2 alors que le
  // progression.json ou le localStorage date du Bloc 1 seulement).
  const migrateProgression = useCallback((prog) => {
    if (!prog || !prog.lecons) return prog;
    const patched = { ...prog.lecons };
    let changed = false;
    for (const id of LESSON_ORDER) {
      if (!patched[id]) {
        patched[id] = { statut: 'non_demarree', date_demarrage: null, date_completion: null, duree_reelle_minutes: null };
        changed = true;
      }
    }
    if (!changed) return prog;
    return { ...prog, lecons: patched };
  }, []);

  useEffect(() => {
    (async () => {
      const repoData = await loadStateFromRepo();
      const lsData = loadStateFromLS();

      const base = lsData ? {
        progression: lsData.progression || repoData.progression,
        journal: lsData.journal || repoData.journal,
        tessiture: lsData.tessiture || repoData.tessiture,
        vocabulaire_enseignante: lsData.vocabulaire_enseignante || repoData.vocabulaire_enseignante,
      } : repoData;

      // Migration défensive : si de nouvelles leçons ont été ajoutées au code
      // sans que progression.json soit mis à jour, on patch les entrées manquantes.
      const migrated = {
        ...base,
        progression: migrateProgression(base.progression),
      };

      setState(migrated);
    })();
  }, [migrateProgression]);

  // Sauvegarde automatique dans localStorage
  useEffect(() => {
    if (state) saveStateToLS(state);
  }, [state]);

  const setProgression = useCallback((updater) => {
    setState(prev => ({ ...prev, progression: typeof updater === 'function' ? updater(prev.progression) : updater }));
  }, []);

  const setJournal = useCallback((updater) => {
    setState(prev => ({ ...prev, journal: typeof updater === 'function' ? updater(prev.journal) : updater }));
  }, []);

  const activateAudio = () => {
    audio.ensureContext();
    setNeedsAudioActivation(false);
  };

  if (!state) {
    return h('div', { className: 'min-h-screen flex items-center justify-center text-dim' }, 'Chargement…');
  }

  return h('div', { className: 'min-h-screen bg-paper' },
    // Barre supérieure
    h('nav', { className: 'sticky top-0 z-30 bg-paper/95 backdrop-blur border-b border-rule px-4 sm:px-6 py-3 flex items-center justify-between no-print' },
      h('button', {
        onClick: () => setView({ type: 'overview' }),
        className: 'font-serif-display text-lg hover:text-accent transition-colors',
      }, 'Chant'),
      h('div', { className: 'flex items-center gap-1' },
        h('button', {
          onClick: () => setShowGlossary(true),
          className: 'px-3 py-1.5 text-xs hover:bg-soft rounded-sm transition-colors',
          title: 'Glossaire des termes',
        }, 'Glossaire'),
        h('button', {
          onClick: () => setView({ type: 'journal' }),
          className: 'px-3 py-1.5 text-xs hover:bg-soft rounded-sm transition-colors',
          title: 'Journal de pratique',
        }, 'Journal'),
        h('button', {
          onClick: () => setShowExport(true),
          className: 'px-3 py-1.5 text-xs hover:bg-soft rounded-sm transition-colors',
          title: 'Exporter les données pour sauvegarde dans le repo',
        }, 'Exporter'),
        h('button', {
          onClick: () => setShowSettings(true),
          className: 'px-2.5 py-1.5 text-xs hover:bg-soft rounded-sm transition-colors',
          title: 'Paramètres (audio, iOS, timbre)',
          'aria-label': 'Paramètres',
        }, '⚙')
      )
    ),

    // Bannière activation audio (iOS + diagnostic)
    needsAudioActivation ? h(AudioActivationBanner, {
      onActivate: activateAudio,
    }) : null,

    // Contenu
    h('main', { className: 'px-4 sm:px-6' },
      view.type === 'overview' ? h(Overview, {
        progression: state.progression,
        onSelectLesson: (id) => setView({ type: 'lesson', id }),
      }) :
      view.type === 'lesson' ? h(LessonView, {
        lessonId: view.id,
        progression: state.progression,
        setProgression,
        onBack: () => setView({ type: 'overview' }),
      }) : null
    ),

    // Modals
    view.type === 'journal' ? h(JournalView, {
      journal: state.journal,
      setJournal,
      onClose: () => setView({ type: 'overview' }),
    }) : null,
    showExport ? h(ExportPanel, { state, onClose: () => setShowExport(false) }) : null,
    showSettings ? h(SettingsPanel, { onClose: () => setShowSettings(false) }) : null,
    showGlossary ? h(GlossaryView, {
      onClose: () => setShowGlossary(false),
      onNavigateToLesson: (id) => setView({ type: 'lesson', id }),
    }) : null,

    // Footer
    h('footer', { className: 'mt-20 py-8 border-t border-rule text-center text-xs text-dim no-print' },
      h('p', null, 'Parcours personnel · ',
        h('a', { href: 'https://github.com/tombychan/chant', className: 'underline hover:text-ink' }, 'github.com/tombychan/chant')
      )
    )
  );
}
